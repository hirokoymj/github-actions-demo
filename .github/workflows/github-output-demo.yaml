name: GITHUB_OUTPUT example
on: workflow_dispatch

jobs:
  producer:
    runs-on: ubuntu-latest
    outputs:
      message: ${{ steps.set-variable.outputs.message }}
      color: ${{ steps.set-variable.outputs.color }}
    steps:
      - name: Set variables
        id: set-variable
        run: |
          echo "message=Hello from producer" >> $GITHUB_OUTPUT
          echo "color=green" >> $GITHUB_OUTPUT
  consumer:
    runs-on: ubuntu-latest
    needs: producer

    steps:
      - name: Read output
        run: |
          echo "${{ needs.producer.outputs.message }}"
          echo "${{ needs.producer.outputs.color }}"
